<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Access Portal // Stackly</title>
    <!-- Separate Login Specific Style Sheet Link -->
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="auth-viewport-lock">

    <!-- Cinematic Background Image Viewport Box Area -->
    <div class="portal-image-viewport">
        <div class="portal-fog-overlay"></div>
        <img src="./Assests/cyber cycle.webp" 
             alt="VoltEdge Security Grid Background Layout" 
             class="portal-scenery-image">
    </div>

    <!-- Main Card Structure Core Wrapper -->
    <div class="portal-layout-wrapper">
        <div class="auth-console-box">
            
            <!-- Top Routing Shortcut Navigation Link Anchor -->
            <div class="top-router-row">
                <a href="index.html" class="portal-return-base">&larr; HOME</a>
            </div>

            <header class="portal-header-row">
                <h1 class="portal-main-title">WELCOME BACK</h1>
                <p class="portal-sub-text">Select your operational platform role to access your secure inventory workspace.</p>
            </header>

            <!-- Dynamic Role Grid Selector Section -->
            <div class="role-selector-container">
                <p class="role-section-label">SELECT PLATFORM ROLE</p>
                <div class="role-grid">
                    <!-- Option 1: Studio Partner (Active State by Default) -->
                    <div class="role-node active-role" data-role="partner">
                        <div class="role-icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                        </div>
                        <span class="role-title-text">Studio Partner</span>
                    </div>
                    <!-- Option 2: Corporate Client -->
                    <div class="role-node" data-role="corporate">
                        <div class="role-icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        </div>
                        <span class="role-title-text">Corporate Client</span>
                    </div>
                </div>
            </div>

            <!-- Interactive Login Form Hub Matrix -->
            <form id="cyberLoginConsole" class="cyber-portal-form" novalidate>
                
                <!-- Input 1: Email Coordinate -->
                <div class="console-input-group">
                    <label for="accessId">EMAIL ADDRESS</label>
                    <input type="email" id="accessId" placeholder="name@company.com" required>
                </div>

                <!-- Input 2: Password Key -->
                <div class="console-input-group field-with-icon">
                    <label for="encryptionKey">PASSWORD</label>
                    <input type="password" id="encryptionKey" placeholder="Enter security key" required>
                    <button type="button" class="password-toggle-eye" id="eyeToggleBtn" aria-label="Toggle visibility">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <!-- Remember Me & Forgot Password Utilities Utilities Row -->
                <div class="portal-utilities-row">
                    <label class="remember-chassis">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="404.html" class="portal-forgot-anchor">Forgot Password?</a>
                </div>

                <!-- Launch Submit Action Node Button -->
                <button type="submit" class="console-submit-btn">
                    LOG IN SECURELY &rarr;
                </button>

                <!-- Hidden Terminal Status Feedback Log Panel -->
                <div class="portal-terminal-feedback" id="portalFeedback"></div>
            </form>

            <!-- Social Media Sign In Hub Separation -->
            <div class="social-divider-row">
                <span class="divider-text">OR SIGN IN WITH</span>
            </div>

            <div class="social-auth-deck">
                <a href="404.html" class="social-auth-node">Google</a>
                <a href="404.html" class="social-auth-node">Facebook</a>
            </div>

            <!-- Lower Navigation Alternative Switch Path Footer -->
            <footer class="portal-switch-footer">
                <span>Don't have an account?</span>
                <a href="signup.html" class="portal-switch-anchor">Create Account</a>
            </footer>

        </div>
    </div>

    <style>
        /* =========================================================================
   CINEMATIC LOGIN PORTAL DECK WITH CORE COMPONENT GLOWS
   ========================================================================= */
:root {
    --portal-void: #05060f;
    --preloader-neon: #39ff14;
    --matte-glass-panel: rgba(11, 12, 16, 0.85);
    --card-dark-bg: #070912;
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
}

body.auth-viewport-lock {
    background-color: var(--portal-void);
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    padding: 2rem 1rem;
}

/* Background Backdrop Canvas Configurator */
.portal-image-viewport {
    position: absolute;
    inset: 0; width: 100%; height: 100%; z-index: -2;
    overflow: hidden;
}

.portal-fog-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(11, 12, 16, 0.6) 0%, #05060f 100%);
    z-index: -1;
}

.portal-scenery-image {
    width: 100%; height: 100%; object-fit: cover; opacity: 0.25;
}

/* Central Translucent Glass Card Envelope Container */
.portal-layout-wrapper {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 520px; /* Locks matching structural compact width grid width */
}

.auth-console-box {
    background: var(--matte-glass-panel);
    border: 1px solid rgba(57, 255, 20, 0.15); /* Domain themed green frame border outline */
    border-radius: 12px;
    padding: 3rem 2.8rem;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

/* Top Router Link Alignment Row */
.top-router-row {
    display: flex;
    justify-content: flex-end;
    width: 100%;
}

.portal-return-base {
    font-family: monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: #94a3b8;
    text-decoration: none;
    letter-spacing: 1.5px;
    transition: color 0.3s ease;
}

.portal-return-base:hover {
    color: var(--preloader-neon);
}

/* Typography Header Deck Area Layouts */
.portal-header-row {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    text-align: left;
}

.portal-main-title {
    font-family: 'Georgia', serif; /* Serif style matching screenshot header font selection */
    font-size: 2.4rem;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: 0.5px;
}

/* =========================================================================
   OVERRIDE FIX: VISIBILITY FOR LOGIN PORTAL TEXT ELEMENTS
   ========================================================================= */

/* FIXED: Changed subhead descriptors from dark gray to pure white */
.portal-sub-text {
    font-size: 0.95rem !important;
    line-height: 1.5 !important;
    color: #ffffff !important; /* Pure sharp visible white text descriptions */
    opacity: 0.85 !important;
}

/* FIXED: Changed role selection context labels from charcoal to crisp white */
.role-section-label {
    font-family: monospace !important;
    font-size: 0.75rem !important;
    font-weight: 700 !important;
    color: #ffffff !important; /* Forced label lines visibility properties */
    letter-spacing: 2px !important;
    opacity: 0.9 !important;
}

/* FIXED: Inactive title grids now show up clearly in solid silver-white */
.role-title-text {
    font-size: 0.85rem !important;
    font-weight: 700 !important;
    color: #e2e8f0 !important; /* High contrast row text */
}

/* FIXED: Form field text labels changed from dark slate to bright white */
.console-input-group label {
    font-family: monospace !important;
    font-size: 0.75rem !important;
    font-weight: 700 !important;
    color: #ffffff !important; /* Pure white readable input headings */
    letter-spacing: 1.5px !important;
    opacity: 0.95 !important;
}

/* FIXED: Remember me utility labels forced to crisp white */
.remember-chassis span {
    color: #ffffff !important;
    opacity: 0.9 !important;
}

/* FIXED: Forgot password link forced into a visible white tracking line */
.portal-forgot-anchor {
    color: #ffffff !important;
    opacity: 0.8 !important;
    text-decoration: none !important;
}
.portal-forgot-anchor:hover {
    color: var(--preloader-neon) !important;
    opacity: 1 !important;
}

/* FIXED: Lower account switchboard descriptions forced to bright white */
.portal-switch-footer span {
    color: #ffffff !important;
    opacity: 0.85 !important;
}


/* Interactive Platform Role Split Selector Box Nodes */
.role-selector-container {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    width: 100%;
    margin-top: 0.5rem;
}

.role-section-label {
    font-family: monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: #475569;
    letter-spacing: 2px;
}

.role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    width: 100%;
}

.role-node {
    background: var(--card-dark-bg);
    border: 1.5px solid rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    cursor: pointer;
    transition: all 0.35s ease;
}

.role-icon-box {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #475569;
    transition: all 0.35s ease;
}

.role-title-text {
    font-size: 0.85rem;
    font-weight: 700;
    color: #475569;
    transition: color 0.3s ease;
}

/* Hover and active illuminated grid nodes override rules strings */
.role-node:hover {
    border-color: rgba(57, 255, 20, 0.3);
}

.role-node.active-role {
    border-color: var(--preloader-neon) !important; /* Forces green accent mapping */
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.1);
}

.role-node.active-role .role-icon-box {
    background: #0b0c10;
    border-color: var(--preloader-neon);
    color: var(--preloader-neon);
    filter: drop-shadow(0 0 4px rgba(57, 255, 20, 0.4));
}

.role-node.active-role .role-title-text {
    color: #ffffff;
}

/* Form input vertical array structural blocks styling */
.cyber-portal-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    width: 100%;
    margin-top: 0.5rem;
}

.console-input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    position: relative;
}

.console-input-group label {
    font-family: monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: #475569;
    letter-spacing: 1.5px;
    text-align: left;
}

.console-input-group input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--card-dark-bg);
    border: 1.5px solid rgba(255, 255, 255, 0.05);
    color: #ffffff !important; /* FORCED HIGH-CONTRAST DATA VALUE VISIBILITY */
    border-radius: 6px;
    font-size: 0.9rem;
    outline: none;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

.console-input-group input:focus {
    border-color: var(--preloader-neon);
    box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
}

/* Password side vector eye tracking settings */
.field-with-icon input { padding-right: 2.8rem; }

.password-toggle-eye {
    position: absolute; right: 1rem; bottom: 0.85rem;
    background: transparent; border: none;
    color: #334155; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.3s ease;
}
.password-toggle-eye:hover, .password-toggle-eye.eye-active { color: var(--preloader-neon); }

/* Utilities helper controls line row layout alignment */
.portal-utilities-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-top: 0.2rem;
}

.remember-chassis {
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer; color: #94a3b8;
}
.remember-chassis input { accent-color: var(--preloader-neon); cursor: pointer; }

.portal-forgot-anchor {
    color: #475569; text-decoration: none; transition: color 0.3s ease;
}
.portal-forgot-anchor:hover { color: #ffffff; }

/* Domain themed High-Contrast Solid Action Button */
.console-submit-btn {
    width: 100%;
    background: var(--preloader-neon); /* Solid theme color matching screenshot button placement specs */
    color: var(--portal-void);
    border: none;
    padding: 1rem;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-top: 0.8rem;
    box-shadow: 0 4px 15px rgba(57, 255, 20, 0.25);
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.console-submit-btn:hover {
    background: #ffffff;
    color: var(--portal-void);
    box-shadow: 0 0 25px #ffffff;
    transform: translateY(-2px);
}

/* Social buttons container grids */
.social-divider-row {
    text-align: center;
    position: relative;
    margin: 0.5rem 0;
}
.social-divider-row::before {
    content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px;
    background: rgba(255,255,255,0.05); z-index: 1;
}
.divider-text {
    font-family: monospace; font-size: 0.7rem; font-weight: 700; color: #334155;
    background: #0f111a; padding: 0 1rem; position: relative; z-index: 5; letter-spacing: 1.5px;
}

.social-auth-deck {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    width: 100%;
}

.social-auth-node {
    background: var(--card-dark-bg);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: #cbd5e1; text-decoration: none; font-size: 0.85rem; font-weight: 600;
    padding: 0.75rem; border-radius: 6px; text-align: center;
    transition: all 0.3s ease;
}
.social-auth-node:hover {
    border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.02); color: #ffffff;
}

/* Switch alternative footer text links contrast panels */
.portal-switch-footer {
    text-align: center;
    font-size: 0.85rem;
    color: #64748b;
    margin-top: 0.8rem;
}

.portal-switch-anchor {
    color: var(--preloader-neon); /* Clear bright glowing clickable reference paths */
    text-decoration: none;
    font-weight: 700;
    margin-left: 3px;
    transition: text-shadow 0.3s ease;
}
.portal-switch-anchor:hover { text-shadow: 0 0 8px var(--preloader-neon); }

/* Feedback console terminal alert line */
.portal-terminal-feedback {
    font-family: monospace; font-size: 0.75rem; font-weight: bold;
    text-align: center; display: none; padding: 0.5rem; border-radius: 4px;
}
.portal-terminal-feedback.success-state {
    display: block; color: var(--preloader-neon);
    background: rgba(57, 255, 20, 0.04); border: 1px solid rgba(57, 255, 20, 0.15);
}

/* Fluid Responsive Breakpoints Overrides */
@media (max-width: 576px) {
    .auth-console-box { padding: 2rem 1.25rem; gap: 1.2rem; }
    .portal-main-title { font-size: 1.8rem; }
    .role-grid { grid-template-columns: 1fr; gap: 0.8rem; }
}

    </style>

    <script>
// =========================================================================
// HIGH-PERFORMANCE DYNAMIC AUTHENTICATION ROUTER ENGINE
// =========================================================================

document.addEventListener("DOMContentLoaded", () => {
    const loginForm = document.getElementById("cyberLoginConsole");
    const feedbackTerminal = document.getElementById("portalFeedback");
    
    const roleNodes = document.querySelectorAll(".role-node");
    const eyeToggleBtn = document.getElementById("eyeToggleBtn");
    const passwordInput = document.getElementById("encryptionKey");

    // 1. Dual Grid Role Selector Toggle Pipeline
    roleNodes.forEach(node => {
        node.addEventListener("click", () => {
            // Retract historical highlights on alternate array selection choices
            document.querySelector(".role-node.active-role")?.classList.remove("active-role");
            node.classList.add("active-role");
        });
    });

    // 2. Password Character Eye Toggle Controller
    if (eyeToggleBtn && passwordInput) {
        eyeToggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeToggleBtn.classList.add("eye-active");
            } else {
                passwordInput.type = "password";
                eyeToggleBtn.classList.remove("eye-active");
            }
        });
    }

    // 3. FIXED: Dynamic Multi-Channel Form Submission Path Swapper
    if (loginForm && feedbackTerminal) {
        loginForm.addEventListener("submit", function(e) {
            e.preventDefault();
            
            // Extract email element field coordinate input inside the login form chassis console
            const emailInputNode = document.getElementById("accessId");
            if (emailInputNode && emailInputNode.value.trim()) {
                // Securely save the email string to localStorage for dashboard greeting parsing (e.g. jeevi@gmail.com)
                localStorage.setItem("operatorSessionMail", emailInputNode.value.trim());
            }

            // Find current active role grid node element selection parameters
            const activeRoleElement = document.querySelector(".role-node.active-role");
            const activeRoleText = activeRoleElement.querySelector(".role-title-text").innerText;
            
            // Extract user type string parameter ('partner' or 'corporate') straight from data attributes
            const targetedUserRoleType = activeRoleElement.getAttribute("data-role");

            // Display live terminal success status messages path loops
            feedbackTerminal.className = "portal-terminal-feedback success-state";
            feedbackTerminal.innerHTML = `[SUCCESS]: LINK_ESTABLISHED // Secure workspace opened under context: ${activeRoleText.toUpperCase()}. Compiling terminal records...`;
            
            loginForm.reset();
            
            // FIXED: Evaluates data-role tokens dynamically to select unique target document destinations
            setTimeout(() => {
                if (targetedUserRoleType === "partner") {
                    // Routes partner logins straight to your new dashboard chassis page
                    window.location.href = "partner-dashboard.html";
                } else if (targetedUserRoleType === "corporate") {
                    // Routes clients straight to their custom client management dashboard page
                    window.location.href = "client-dashboard.html";
                } else {
                    // Standard safety home viewport terminal fallback loop routing
                    window.location.href = "index.html";
                }
            }, 2400); // 2.4-second delay matches validation text display countdown timeline
        });
    }
});

    </script>
</body>
</html>
