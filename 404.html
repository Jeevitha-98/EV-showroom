<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error 404 // VoltEdge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0b0c10; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .error-card { padding: 2rem; border: 1px solid rgba(57, 255, 20, 0.2); background: rgba(11,12,16,0.8); border-radius: 8px; max-width: 400px; box-shadow: 0 0 30px rgba(57,255,20,0.1); }
        h1 { color: #39ff14; font-size: 4rem; margin: 0 0 1rem 0; text-shadow: 0 0 10px rgba(57,255,20,0.3); }
        p { color: #94a3b8; font-size: 1rem; line-height: 1.5; margin-bottom: 2rem; }
        a { display: inline-block; padding: 0.8rem 2rem; background: #39ff14; color: #0b0c10; font-weight: bold; text-decoration: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(57,255,20,0.3); transition: 0.3s; }
        a:hover { box-shadow: 0 0 25px #39ff14; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #39ff14; margin-bottom: 1rem;"></i>
        <h1>404</h1>
        <p>ROUTE_NOT_FOUND: The performance database section or booking node you are trying to access is currently undergoing calibration loops.</p>
        <a href="index.html">RETURN TO BASE</a>
    </div>
</body>
</html>
